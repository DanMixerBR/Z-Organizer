name: Build Z-Organizer

on:
  workflow_dispatch: 
    inputs:
      versao_tag:
        description: 'Tag da Versão (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Z-Organizer.exe
            zip_name: Z-Organizer_Windows.zip
          - os: ubuntu-latest
            artifact_name: Z-Organizer
            zip_name: Z-Organizer_Linux.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc python3-dev zip

      # --- NOVO: Compilação Windows (PyInstaller com Ícone) ---
      - name: Build Windows Executable (PyInstaller)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon="assets/icon.ico" --name "Z-Organizer" main.py
          Move-Item -Path dist\Z-Organizer.exe -Destination Z-Organizer.exe

      # --- NOVO: Compilação Linux (PyInstaller com Ícone) ---
      - name: Build Linux Executable (PyInstaller)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --noconfirm --onefile --icon="assets/icon.png" --name "Z-Organizer" main.py
          mv dist/Z-Organizer Z-Organizer

      # A tag 'shell: bash' garante o funcionamento igual em ambos os SOs
      # Aqui nós criamos o version.txt e preparamos a pasta 'bin'
      - name: Criar version.txt e preparar pasta bin
        shell: bash
        run: |
          echo "${{ github.event.inputs.versao_tag }}" | tr -d 'A-Za-z' > version.txt
          mkdir -p bin
          cp version.txt bin/
          cp assets/logo.png bin/

      # COMPRESSÃO MÁXIMA: Usando 7-Zip no Windows (-mx=9). Adicionamos a pasta 'bin'
      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: 7z a -tzip -mx=9 ${{ matrix.zip_name }} Z-Organizer.exe bin

      # COMPRESSÃO MÁXIMA: Usando zip no Linux (-9). 
      # Mudamos de -j para -r para preservar a pasta 'bin' dentro do zip
      - name: Zip Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: zip -9 -r ${{ matrix.zip_name }} Z-Organizer bin

      - name: Upload Artifacts to Pipeline
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release-and-publish:
    name: Generate Hashes and Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloads
          merge-multiple: true

      - name: Calculate Hashes and Update hash.txt
        run: |
          HASH_WIN=$(sha256sum ./downloads/Z-Organizer_Windows.zip | awk '{ print $1 }')
          HASH_LINUX=$(sha256sum ./downloads/Z-Organizer_Linux.zip | awk '{ print $1 }')

          # Salva os dois hashes no mesmo arquivo
          echo "$HASH_WIN" > hash.txt
          echo "$HASH_LINUX" >> hash.txt

      - name: Salvar os Hashes direto no Repositório (Commit Automático)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Atualização automática de hashes para a versão ${{ github.event.inputs.versao_tag }}"
          file_pattern: "hash.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.versao_tag }}
          name: "Z-Organizer ${{ github.event.inputs.versao_tag }}"
          files: |
            ./downloads/Z-Organizer_Windows.zip
            ./downloads/Z-Organizer_Linux.zip
          draft: true
