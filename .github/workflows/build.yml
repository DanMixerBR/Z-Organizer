name: Build Z-Organizer

on:
  workflow_dispatch: 
    inputs:
      versao_tag:
        description: 'Tag da Versão (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Z-Organizer.exe
            zip_name: Z-Organizer_Windows.zip
          - os: ubuntu-latest
            artifact_name: Z-Organizer
            zip_name: Z-Organizer_Linux.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install zstandard Nuitka

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf ccache gcc python3-dev zip

      - name: Build Windows Executable (Nuitka)
        if: matrix.os == 'windows-latest'
        run: python -m nuitka --assume-yes-for-downloads --onefile --windows-console-mode=disable --enable-plugin=tk-inter --company-name="DanMixerBR" --product-name="Z-Organizer" --file-version=1.0.0.0 --product-version=1.0.0.0 --copyright="MIT License" --output-filename=Z-Organizer.exe main.py

      - name: Build Linux Executable (Nuitka)
        if: matrix.os == 'ubuntu-latest'
        run: python -m nuitka --assume-yes-for-downloads --onefile --enable-plugin=tk-inter -o Z-Organizer main.py

      # --- NOVO PASSO: Gera o arquivo version.txt ---
      # A tag 'shell: bash' garante que o arquivo seja salvo em UTF-8 puro em ambos os sistemas
      - name: Criar arquivo version.txt
        shell: bash
        run: echo "${{ github.event.inputs.versao_tag }}" > version.txt

     # --- COMPRESSÃO MÁXIMA: Usando 7-Zip no Windows (-mx=9) ---
      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: 7z a -tzip -mx=9 ${{ matrix.zip_name }} Z-Organizer.exe version.txt

      # --- COMPRESSÃO MÁXIMA: Usando zip no Linux (-9) ---
      - name: Zip Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: zip -9 -j ${{ matrix.zip_name }} Z-Organizer version.txt

      - name: Upload Artifacts to Pipeline
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release-and-publish:
    name: Generate Hashes and Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloads
          merge-multiple: true

      - name: Calculate Hashes and Update hash_v2.txt
        run: |
          HASH_WIN=$(sha256sum ./downloads/Z-Organizer_Windows.zip | awk '{ print $1 }')
          HASH_LINUX=$(sha256sum ./downloads/Z-Organizer_Linux.zip | awk '{ print $1 }')

          # Salva os dois hashes no mesmo arquivo
          echo "$HASH_WIN" > hash.txt
          echo "$HASH_LINUX" >> hash.txt

      - name: Salvar os Hashes direto no Repositório (Commit Automático)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Atualização automática de hashes para a versão ${{ github.event.inputs.versao_tag }}"
          file_pattern: "hash.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.versao_tag }}
          name: "Z-Organizer ${{ github.event.inputs.versao_tag }}"
          files: |
            ./downloads/Z-Organizer_Windows.zip
            ./downloads/Z-Organizer_Linux.zip
          draft: true
