name: Build Z-Organizer

on:
  workflow_dispatch: 
    inputs:
      versao_tag:
        description: 'Tag da Versão (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Z-Organizer.exe
            zip_name: Z-Organizer_Windows.zip
          - os: ubuntu-latest
            artifact_name: Z-Organizer
            zip_name: Z-Organizer_Linux.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc python3-dev zip patchelf

      # --- Compilação Windows (Nuitka + Launcher C#) ---
      - name: Build Windows Executable
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $CLEAN_V = ("${{ github.event.inputs.versao_tag }}" -replace '[A-Za-z]', '').Trim('.') + ".0"
          # 1. Nuitka gera o binário do app dentro da pasta main.dist
          python -m nuitka --assume-yes-for-downloads --standalone --windows-console-mode=disable `
          --enable-plugin=tk-inter --windows-icon-from-ico="assets/icon.ico" `
          --company-name="DanMixerBR" --product-name="Z-Organizer" `
          --file-description="Z-Organizer" --copyright="MIT License" `
          --file-version="$CLEAN_V" --product-version="$CLEAN_V" `
          --output-filename=Z-Organizer.exe main.py
          
          # 2. Estruturar a pasta Release e a Subpasta core/bin
          New-Item -ItemType Directory -Path release\core\bin
          Move-Item -Path main.dist\* -Destination release\core
          Remove-Item main.dist
          
          # 3. Copiar os Assets e Gerar o version.txt na pasta core/bin
          Copy-Item -Path bin\translations.py -Destination release\core\bin\
          Copy-Item -Path assets\logo.png -Destination release\core\bin\
          Copy-Item -Path assets\icon.ico -Destination release\core\bin\
          $CLEAN_V = ("${{ github.event.inputs.versao_tag }}" -replace '[A-Za-z]', '')
          Set-Content -Path release\core\bin\version.txt -Value $CLEAN_V
          
          # 4. Compilar o Launcher C (Nativo) na raiz da pasta Release
          windres assets\launcher.rc -O coff -o launcher.res

          # Compila o código C unindo o arquivo de recursos. 
          # -mwindows esconde a tela preta do CMD. -O3 aplica otimização máxima de velocidade.
          gcc assets\launcher.c launcher.res -o release\Z-Organizer.exe -mwindows -O3
          
          # 5. Compactar tudo: O ZIP conterá o Z-Organizer.exe (Launcher) + Pasta "core"
          7z a -tzip -mx=9 ${{ matrix.zip_name }} .\release\*

      # --- Compilação Linux (Nuitka Standalone Puro) ---
      - name: Build Linux Executable
        if: matrix.os == 'ubuntu-latest'
        run: |
          # 1. Nuitka gera o binário nativo Linux dentro de main.dist
          python -m nuitka --assume-yes-for-downloads --standalone --disable-ccache --enable-plugin=tk-inter -o Z-Organizer main.py
          
          # 2. Estruturar a pasta Release e core/bin
          mkdir -p release/core/bin
          mv main.dist/* release/core/
          rm -rf main.dist
          
          # 3. Copiar os Assets e Gerar o version.txt
          cp bin/translations.py release/core/bin/
          cp assets/logo.png release/core/bin/
          cp assets/icon.png release/core/bin/ 2>/dev/null || true
          echo "${{ github.event.inputs.versao_tag }}" | tr -d 'A-Za-z' > release/core/bin/version.txt
          
          # 4. Adicionar o script de instalação Linux e Zipar
          cp assets/Install_Z-Organizer.sh release/
          chmod +x release/Install_Z-Organizer.sh
          cd release
          zip -9 -r ../${{ matrix.zip_name }} ./*

      - name: Upload Artifacts to Pipeline
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release-and-publish:
    name: Generate Hashes and Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloads
          merge-multiple: true

      - name: Calculate Hashes and Update hash.txt
        run: |
          HASH_WIN=$(sha256sum ./downloads/Z-Organizer_Windows.zip | awk '{ print $1 }')
          HASH_LINUX=$(sha256sum ./downloads/Z-Organizer_Linux.zip | awk '{ print $1 }')
          
          # Calcula o hash dos scripts de atualização nativos
          HASH_BAT=$(sha256sum update.bat | awk '{ print $1 }')
          HASH_SH=$(sha256sum update.sh | awk '{ print $1 }')
          
          # Sobrescreve o hash_v2.txt com o prefixo 'sha256:' para maior clareza e segurança
          echo "sha256:$HASH_WIN" > hash.txt
          echo "sha256:$HASH_LINUX" >> hash.txt
          echo "sha256:$HASH_BAT" >> hash.txt
          echo "sha256:$HASH_SH" >> hash.txt
          
          # Igual ao CopynDown: garante que o version.txt da raiz do GitHub também fique atualizado!
          mkdir -p bin
          echo "${{ github.event.inputs.versao_tag }}" | tr -d 'A-Za-z' > bin/version.txt

      - name: Salvar os Hashes direto no Repositório (Commit Automático)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Atualização automática de hashes para a versão ${{ github.event.inputs.versao_tag }}"
          file_pattern: "hash.txt bin/version.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.versao_tag }}
          name: "Z-Organizer ${{ github.event.inputs.versao_tag }}"
          files: |
            ./downloads/Z-Organizer_Windows.zip
            ./downloads/Z-Organizer_Linux.zip
          draft: true
