name: Build Z-Organizer

on:
  workflow_dispatch: 
    inputs:
      versao_tag:
        description: 'Tag da Versão (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Z-Organizer.exe
            zip_name: Z-Organizer_Windows.zip
          - os: ubuntu-latest
            artifact_name: Z-Organizer
            zip_name: Z-Organizer_Linux.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc python3-dev zip patchelf

      # --- NOVO: Compilação Windows (Nuitka + Warp Packer) ---
      - name: Build Windows Executable
        if: matrix.os == 'windows-latest'
        run: |
          # 1. Nuitka gera a pasta Standalone (Segura contra Antivírus)
          python -m nuitka --assume-yes-for-downloads --standalone --windows-console-mode=disable --windows-icon-from-ico="assets/icon.ico" --enable-plugin=tk-inter --output-dir=dist main.py
          
          # 2. Baixar Warp Packer
          Invoke-WebRequest -Uri https://github.com/dgiagio/warp/releases/download/v0.3.0/windows-x64.warp-packer.exe -OutFile warp-packer.exe
          
          # 3. Warp empacota a pasta num executável Onefile instantâneo
          .\warp-packer.exe --arch windows-x64 --input_dir dist\main.dist --exec main.exe --output Z-Organizer.exe

      # --- NOVO: Compilação Linux (Nuitka + Warp Packer) ---
      - name: Build Linux Executable
        if: matrix.os == 'ubuntu-latest'
        run: |
          # 1. Nuitka gera a pasta Standalone
          python -m nuitka --assume-yes-for-downloads --standalone --enable-plugin=tk-inter --output-dir=dist main.py
          
          # 2. Baixar Warp Packer
          wget https://github.com/dgiagio/warp/releases/download/v0.3.0/linux-x64.warp-packer -O warp-packer
          chmod +x warp-packer
          
          # 3. Warp empacota a pasta num executável Onefile instantâneo
          ./warp-packer --arch linux-x64 --input_dir dist/main.dist --exec main --output Z-Organizer

      # A tag 'shell: bash' garante o funcionamento igual em ambos os SOs
      # Aqui nós criamos o version.txt e preparamos a pasta 'bin'
      - name: Criar version.txt e preparar pasta bin
        shell: bash
        run: |
          echo "${{ github.event.inputs.versao_tag }}" | tr -d 'A-Za-z' > version.txt
          mkdir -p bin
          cp version.txt bin/
          cp assets/logo.png bin/

      # COMPRESSÃO MÁXIMA: Usando 7-Zip no Windows (-mx=9). Adicionamos a pasta 'bin'
      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cp assets/icon.ico bin/
          7z a -tzip -mx=9 ${{ matrix.zip_name }} Z-Organizer.exe bin

      # COMPRESSÃO MÁXIMA: Usando zip no Linux (-9). 
      # Mudamos de -j para -r para preservar a pasta 'bin' dentro do zip
      - name: Zip Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp assets/icon.png bin/
          cp assets/Install_Z-Organizer.sh ./
          chmod +x Install_Z-Organizer.sh
          zip -9 -r ${{ matrix.zip_name }} Z-Organizer Install_Z-Organizer.sh bin

      - name: Upload Artifacts to Pipeline
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release-and-publish:
    name: Generate Hashes and Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloads
          merge-multiple: true

      - name: Calculate Hashes and Update hash.txt
        run: |
          HASH_WIN=$(sha256sum ./downloads/Z-Organizer_Windows.zip | awk '{ print $1 }')
          HASH_LINUX=$(sha256sum ./downloads/Z-Organizer_Linux.zip | awk '{ print $1 }')

          # Salva os dois hashes no mesmo arquivo
          echo "$HASH_WIN" > hash.txt
          echo "$HASH_LINUX" >> hash.txt

      - name: Salvar os Hashes direto no Repositório (Commit Automático)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Atualização automática de hashes para a versão ${{ github.event.inputs.versao_tag }}"
          file_pattern: "hash.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.versao_tag }}
          name: "Z-Organizer ${{ github.event.inputs.versao_tag }}"
          files: |
            ./downloads/Z-Organizer_Windows.zip
            ./downloads/Z-Organizer_Linux.zip
          draft: true
